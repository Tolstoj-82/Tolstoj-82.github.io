<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>TREP – Tile Finder</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="tile-finder.css">
    <link rel="icon" type="image/png" sizes="32x32" href="images/favicon-32x32.png">
  </head>
  <body class="finder-page">
    <div class="container">
      <div id="wrapper" class="finder-workspace">
        <div class="finder-statusbar">
          <span id="finderFileStatus">Load a ROM to begin.</span>
          <span id="finderSelectionStatus">No tiles selected</span>
        </div>

        <div id="finderViewport" class="finder-viewport" tabindex="0">
          <div id="finderTiles" class="finder-tiles"></div>
          <div id="finderMarquee" class="finder-marquee" hidden></div>
        </div>

        <button id="openModalButton" type="button" aria-label="Close sidebar" aria-expanded="true">&times;</button>

        <div id="modalOverlay" style="display:block">
          <div id="modalContent">
            <div id="modalBody">
              <div class="tab-group">
                <div class="tab-container">
                  <div class="tab active">Tile Finder</div>
                  <a class="tab finder-back" href="index.html">← Back to TREP</a>
                </div>
              </div>

              <div class="content-container">
                <div class="tab-content finder-sidebar" style="display:block">
                  <label class="custom-file-input">
                    <input type="file" id="finderRomInput" accept=".gb,.gbc,application/octet-stream">
                  </label><br>

                  <b class="finder-section-title">Decoding</b>
                  <div class="finder-toolbar" aria-label="Tile decoding controls">
                    <fieldset class="finder-bpp">
                      <legend>Format</legend>
                      <label><input type="radio" name="finderBpp" value="1"> 1BPP</label>
                      <label><input type="radio" name="finderBpp" value="2" checked> 2BPP</label>
                    </fieldset>
                    <div class="finder-shift-control">
                      <span>Bit alignment</span>
                      <div>
                        <button id="shiftLeft" type="button" title="Shift the ROM bitstream left">&lt;&lt;</button>
                        <output id="shiftValue">0</output>
                        <button id="shiftRight" type="button" title="Shift the ROM bitstream right">&gt;&gt;</button>
                      </div>
                    </div>
                    <div class="finder-shift-control">
                      <span>Move inside panel</span>
                      <div>
                        <button id="rowPrevious" type="button" title="Move one row up">&uarr;</button>
                        <output id="rowValue">0</output>
                        <button id="rowNext" type="button" title="Move one row down">&darr;</button>
                      </div>
                    </div>
                    <button id="restoreFinderTiles" class="secondary" type="button" disabled>Restore deleted</button>
                  </div>

                  <b class="finder-section-title">Tilesets</b>
                  <label>Name
                    <input id="finderSetName" type="text" placeholder="e.g. Game Play">
                  </label>
                  <div class="finder-range-readout">
                    <span>Selected address range</span>
                    <output id="finderSelectedRange">—</output>
                  </div>
                  <button id="addFinderSet" type="button" disabled>Add selected range</button>
                  <div id="finderSetList" class="finder-set-list"></div>

                  <b class="finder-section-title">Settings output</b>
                  <textarea id="finderOutput" readonly spellcheck="false">const tileAddressesInROM = {};</textarea>
                  <div class="finder-output-actions">
                    <button id="copyFinderOutput" type="button">Copy</button>
                    <button id="downloadFinderOutput" class="secondary" type="button">Download .js</button>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div id="finderTileMenu" class="finder-context-menu" role="menu" hidden>
      <button type="button" data-delete-side="before" role="menuitem">Delete all tiles before</button>
      <button type="button" data-delete-side="after" role="menuitem">Delete all tiles after</button>
    </div>

    <script src="tile-finder.js"></script>
  </body>
</html>
