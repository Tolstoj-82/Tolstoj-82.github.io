<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Game Boy Tetris Post-Max Score Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.9/dist/chart.umd.min.js" defer></script>
    <style>
      :root {
        color-scheme: light;
        font-family: Arial, sans-serif;
        --border: #9b9b9b;
        --valid: #b3e6b3;
        --invalid: #ffcccc;
      }

      * { box-sizing: border-box; }
      body { margin: 0; min-height: 100vh; }
      button, input { font: inherit; }

      .container { display: flex; height: 100dvh; overflow: hidden; }
      .left, .right { width: 50%; }
      .left { display: grid; height: 100dvh; grid-template-rows: auto minmax(0, 1fr) minmax(0, 1fr); overflow: hidden; }
      .panel { min-width: 0; padding: 12px; border: 1px solid var(--border); border-bottom: 0; }
      .right { max-height: 100vh; overflow-y: auto; padding: 10px; }

      .inputs, .summary { display: flex; flex-wrap: wrap; gap: 10px 18px; align-items: center; }
      .inputs label { display: grid; gap: 4px; }
      input { width: 10rem; padding: 5px; border: 1px solid var(--border); border-radius: 3px; }
      input:user-valid { background: var(--valid); }
      input:user-invalid { background: var(--invalid); }
      .summary { margin-top: 12px; }
      .summary { justify-content: space-between; }
      .actions { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
      button { padding: 5px 10px; cursor: pointer; }
      #copyStatus { align-self: center; min-height: 1em; color: #286428; }
      [hidden] { display: none !important; }

      dialog { width: min(28rem, calc(100% - 32px)); padding: 20px; border: 1px solid var(--border); border-radius: 6px; }
      dialog::backdrop { background: rgb(0 0 0 / 45%); }
      dialog p { margin: 0 0 18px; }
      dialog .actions { justify-content: flex-end; }
      #mobileHintDialog {
        width: min(22rem, calc(100% - 40px));
        padding: 22px 24px 24px;
        cursor: pointer;
        text-align: center;
        border: 0;
        border-radius: 18px;
        color: #222;
        background: linear-gradient(145deg, #fff, #f1f4f7);
        box-shadow: 0 18px 50px rgb(0 0 0 / 30%);
      }
      #mobileHintDialog[open] { animation: hint-in 180ms ease-out; }
      #mobileHintDialog::before {
        content: "";
        display: block;
        width: 44px;
        height: 5px;
        margin: 0 auto 18px;
        border-radius: 999px;
        background: #8b949e;
      }
      #mobileHintDialog::backdrop {
        background: rgb(18 24 31 / 58%);
        backdrop-filter: blur(3px);
      }
      #mobileHintDialog p { margin: 0; font-size: 1.05rem; font-weight: 600; line-height: 1.4; }
      @keyframes hint-in {
        from { opacity: 0; transform: translateY(18px) scale(0.97); }
        to { opacity: 1; transform: translateY(0) scale(1); }
      }

      .chart-wrap { position: relative; min-height: 0; }
      .pie-charts { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; min-height: 0; }
      .pie-chart { position: relative; min-width: 0; min-height: 0; }
      canvas { width: 100% !important; height: 100% !important; }

      .mobile-actions { display: none; }

      table { width: 100%; border-collapse: collapse; font-variant-numeric: tabular-nums; }
      thead { position: sticky; top: -10px; z-index: 1; background: #ddd; }
      th, td { padding: 6px; text-align: left; }
      tbody tr:nth-child(even) { background: #f5f5f5; }

      @media (max-width: 768px) {
        .container { display: block; height: auto; overflow: visible; }
        .left, .right { width: 100%; }
        .left { height: 100dvh; }
        .right { max-height: none; overflow: visible; }
        thead { top: 0; }
        .mobile-actions {
          position: fixed;
          right: 0;
          bottom: 0;
          left: 0;
          z-index: 10;
          display: flex;
          justify-content: center;
          gap: 10px;
          padding: 10px max(10px, env(safe-area-inset-right)) calc(10px + env(safe-area-inset-bottom)) max(10px, env(safe-area-inset-left));
          background: rgb(255 255 255 / 94%);
          border-top: 1px solid var(--border);
          box-shadow: 0 -3px 12px rgb(0 0 0 / 18%);
          transform: translateY(110%);
          transition: transform 180ms ease-out;
        }
        .mobile-actions.visible { transform: translateY(0); }
        .clear-button {
          width: 48px;
          height: 48px;
          padding: 0;
          border: 2px solid #fff;
          border-radius: 50%;
          color: #fff;
          font-weight: bold;
          box-shadow: 0 0 0 1px #777;
        }
        .clear-button[data-clear="Single"] { background: #1f77b4; }
        .clear-button[data-clear="Double"] { background: #ff7f0e; }
        .clear-button[data-clear="Triple"] { background: #2ca02c; }
        .clear-button[data-clear="Tetris"] { background: #d62728; }
        .mobile-actions button:disabled { opacity: 0.45; cursor: not-allowed; }
        .mobile-undo { min-width: 58px; border-radius: 24px; }
      }
    </style>
  </head>
  <body>
    <main class="container">
      <section class="left" aria-label="Score tracker">
        <div class="panel">
          <form id="startForm">
            <div class="inputs">
              <label for="lastScore">Last Known Score:
                <input type="number" id="lastScore" min="0" max="999999" step="1" inputmode="numeric" required autofocus />
              </label>
              <label for="lastLines">Last Known Lines:
                <input type="number" id="lastLines" min="0" max="9999" step="1" inputmode="numeric" required />
              </label>
            </div>
          </form>

          <div id="tracker" hidden>
            <div class="summary" aria-live="polite">
              <span id="clearSummary"></span>
              <strong id="scoreSummary"></strong>
            </div>
            <div class="actions">
              <button type="button" id="copyButton">Copy for Excel</button>
              <button type="button" id="resetButton">Reset</button>
              <span id="copyStatus" role="status"></span>
            </div>
          </div>
        </div>

        <div class="panel pie-charts">
          <div class="pie-chart"><canvas id="pieChart" aria-label="Line-clear distribution"></canvas></div>
          <div class="pie-chart"><canvas id="scorePieChart" aria-label="Score contribution by line-clear type"></canvas></div>
        </div>
        <div class="panel chart-wrap"><canvas id="scoreChart" aria-label="Score progress by lines"></canvas></div>
      </section>

      <section class="right" aria-label="Score history">
        <table>
          <thead><tr><th>Lines</th><th>Score</th><th>Line clear</th><th>Score added</th></tr></thead>
          <tbody id="scoreTableBody"></tbody>
        </table>
      </section>
    </main>

    <nav id="mobileActions" class="mobile-actions" aria-label="Mobile score controls">
      <button type="button" class="clear-button" data-clear="Single" aria-label="Record single" disabled>1</button>
      <button type="button" class="clear-button" data-clear="Double" aria-label="Record double" disabled>2</button>
      <button type="button" class="clear-button" data-clear="Triple" aria-label="Record triple" disabled>3</button>
      <button type="button" class="clear-button" data-clear="Tetris" aria-label="Record Tetris" disabled>4</button>
      <button type="button" id="mobileUndoButton" class="mobile-undo" disabled>Undo</button>
    </nav>

    <dialog id="mobileHintDialog" aria-label="Mobile controls hint">
      <p>Swipe up to show the controls.</p>
    </dialog>

    <dialog id="resetDialog" aria-labelledby="resetTitle">
      <strong id="resetTitle">Reset score tracker?</strong>
      <p>This clears the current history so you can enter a new starting score.</p>
      <div class="actions">
        <button type="button" id="cancelResetButton">Cancel</button>
        <button type="button" id="confirmResetButton">Reset</button>
      </div>
    </dialog>

    <script>
      "use strict";

      const MAX_LEVEL = 20;
      const CLEAR_TYPES = Object.freeze({
        Single: { lines: 1, points: 40 },
        Double: { lines: 2, points: 100 },
        Triple: { lines: 3, points: 300 },
        Tetris: { lines: 4, points: 1200 },
      });
      const COLORS = ["#1f77b4", "#ff7f0e", "#2ca02c", "#d62728"];
      const numberFormatter = new Intl.NumberFormat();

      const elements = {
        form: document.querySelector("#startForm"),
        scoreInput: document.querySelector("#lastScore"),
        linesInput: document.querySelector("#lastLines"),
        tracker: document.querySelector("#tracker"),
        copyButton: document.querySelector("#copyButton"),
        resetButton: document.querySelector("#resetButton"),
        copyStatus: document.querySelector("#copyStatus"),
        resetDialog: document.querySelector("#resetDialog"),
        cancelResetButton: document.querySelector("#cancelResetButton"),
        confirmResetButton: document.querySelector("#confirmResetButton"),
        tableBody: document.querySelector("#scoreTableBody"),
        tablePanel: document.querySelector(".right"),
        clearSummary: document.querySelector("#clearSummary"),
        scoreSummary: document.querySelector("#scoreSummary"),
        mobileActions: document.querySelector("#mobileActions"),
        mobileUndoButton: document.querySelector("#mobileUndoButton"),
        mobileHintDialog: document.querySelector("#mobileHintDialog"),
      };

      let history = [];
      let pieChart;
      let scorePieChart;
      let scoreChart;
      let touchStartX = 0;
      let touchStartY = 0;
      let mobileHintShown = false;

      const getLevel = (lines) => Math.min(Math.floor(lines / 10), MAX_LEVEL);
      const currentEntry = () => history.at(-1);

      function createCharts() {
        pieChart = new Chart(document.querySelector("#pieChart"), {
          type: "pie",
          data: {
            labels: Object.keys(CLEAR_TYPES),
            datasets: [{ data: [0, 0, 0, 0], backgroundColor: COLORS, borderColor: "#aaa", borderWidth: 1 }],
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            animation: false,
            plugins: { legend: { display: false }, title: { display: true, text: "Line Clears" } },
          },
        });

        scorePieChart = new Chart(document.querySelector("#scorePieChart"), {
          type: "pie",
          data: {
            labels: Object.keys(CLEAR_TYPES),
            datasets: [{ data: [0, 0, 0, 0], backgroundColor: COLORS, borderColor: "#aaa", borderWidth: 1 }],
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            animation: false,
            plugins: { legend: { display: false }, title: { display: true, text: "Score Added" } },
          },
        });

        scoreChart = new Chart(document.querySelector("#scoreChart"), {
          type: "line",
          data: { datasets: [{ label: "Score progress", data: [], borderColor: COLORS[0], fill: false }] },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            animation: false,
            parsing: false,
            scales: {
              x: { type: "linear", title: { display: true, text: "Lines" } },
              y: { title: { display: true, text: "Score" } },
            },
          },
        });
      }

      function getClearCounts() {
        const counts = Object.fromEntries(Object.keys(CLEAR_TYPES).map((type) => [type, 0]));
        for (const entry of history.slice(1)) counts[entry.lineClear] += 1;
        return counts;
      }

      function getScoreContributions() {
        const contributions = Object.fromEntries(Object.keys(CLEAR_TYPES).map((type) => [type, 0]));
        for (const entry of history.slice(1)) contributions[entry.lineClear] += entry.added;
        return contributions;
      }

      function render() {
        const fragment = document.createDocumentFragment();
        for (const entry of history) {
          const row = document.createElement("tr");
          const values = [entry.lines, numberFormatter.format(entry.score), entry.lineClear || "Start", entry.added ? numberFormatter.format(entry.added) : "—"];
          for (const value of values) {
            const cell = document.createElement("td");
            cell.textContent = value;
            row.append(cell);
          }
          fragment.append(row);
        }
        elements.tableBody.replaceChildren(fragment);

        const entry = currentEntry();
        const counts = getClearCounts();
        const scoreContributions = getScoreContributions();
        elements.clearSummary.textContent = Object.entries(counts).map(([type, count]) => `${type}: ${count}`).join(" | ");
        elements.scoreSummary.textContent = `Lines: ${numberFormatter.format(entry.lines)} | Score: ${numberFormatter.format(entry.score)} | Level: ${getLevel(entry.lines)}`;
        document.querySelectorAll("[data-clear]").forEach((button) => { button.disabled = false; });
        elements.mobileUndoButton.disabled = history.length <= 1;
        pieChart.data.datasets[0].data = Object.values(counts);
        pieChart.update();
        scorePieChart.data.datasets[0].data = Object.values(scoreContributions);
        scorePieChart.update();
        scoreChart.data.datasets[0].data = history.map(({ lines, score }) => ({ x: lines, y: score }));
        scoreChart.update();

        requestAnimationFrame(() => { elements.tablePanel.scrollTop = elements.tablePanel.scrollHeight; });
      }

      function startTracking() {
        if (history.length > 0 || !elements.form.checkValidity()) return;

        const score = Number(elements.scoreInput.value);
        const lines = Number(elements.linesInput.value);
        history = [{ lines, score, lineClear: null, added: 0 }];
        elements.scoreInput.disabled = true;
        elements.linesInput.disabled = true;
        elements.tracker.hidden = false;
        render();
        if (!mobileHintShown && window.matchMedia("(max-width: 768px)").matches) {
          mobileHintShown = true;
          elements.mobileHintDialog.showModal();
        }
      }

      function recordClear(type) {
        if (history.length === 0 || !(type in CLEAR_TYPES)) return;
        const previous = currentEntry();
        const clear = CLEAR_TYPES[type];
        const added = clear.points * (getLevel(previous.lines) + 1);
        history.push({ lines: previous.lines + clear.lines, score: previous.score + added, lineClear: type, added });
        render();
      }

      function undo() {
        if (history.length <= 1) return;
        history.pop();
        render();
      }

      function reset() {
        history = [];
        elements.tableBody.replaceChildren();
        elements.tracker.hidden = true;
        elements.mobileActions.classList.remove("visible");
        document.querySelectorAll("[data-clear]").forEach((button) => { button.disabled = true; });
        elements.mobileUndoButton.disabled = true;
        elements.copyStatus.textContent = "";
        pieChart.data.datasets[0].data = [0, 0, 0, 0];
        pieChart.update();
        scorePieChart.data.datasets[0].data = [0, 0, 0, 0];
        scorePieChart.update();
        scoreChart.data.datasets[0].data = [];
        scoreChart.update();
        elements.scoreInput.disabled = false;
        elements.linesInput.disabled = false;
        elements.scoreInput.value = "";
        elements.linesInput.value = "";
        elements.resetDialog.close();
        elements.scoreInput.focus();
      }

      async function copyForExcel() {
        const rows = [
          ["Lines", "Score", "Line Clear", "Score Added"],
          ...history.map((entry) => [entry.lines, entry.score, entry.lineClear || "Start", entry.added]),
        ];
        const tabSeparatedValues = rows.map((row) => row.join("\t")).join("\r\n");

        try {
          await navigator.clipboard.writeText(tabSeparatedValues);
          elements.copyStatus.textContent = "Copied";
        } catch {
          elements.copyStatus.textContent = "Clipboard access was blocked";
        }
      }

      function handleShortcut(event) {
        if (history.length === 0 || event.altKey || event.target.matches("input, textarea, select")) return;
        const type = Object.keys(CLEAR_TYPES)[Number(event.key) - 1];
        const wantsUndo = event.key === "Backspace" || ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === "z");
        if (type && !event.ctrlKey && !event.metaKey) {
          event.preventDefault();
          recordClear(type);
        } else if (wantsUndo) {
          event.preventDefault();
          undo();
        }
      }

      function handleTouchStart(event) {
        const touch = event.changedTouches[0];
        touchStartX = touch.clientX;
        touchStartY = touch.clientY;
      }

      function handleTouchEnd(event) {
        const touch = event.changedTouches[0];
        const deltaX = touch.clientX - touchStartX;
        const deltaY = touch.clientY - touchStartY;
        if (Math.abs(deltaY) < 50 || Math.abs(deltaY) <= Math.abs(deltaX)) return;
        if (elements.mobileHintDialog.open) elements.mobileHintDialog.close();
        elements.mobileActions.classList.toggle("visible", deltaY < 0);
      }

      window.addEventListener("DOMContentLoaded", () => {
        if (typeof Chart === "undefined") {
          elements.scoreInput.disabled = true;
          elements.linesInput.disabled = true;
          return;
        }
        createCharts();
        elements.form.addEventListener("submit", (event) => { event.preventDefault(); startTracking(); });
        elements.scoreInput.addEventListener("change", startTracking);
        elements.linesInput.addEventListener("change", startTracking);
        elements.copyButton.addEventListener("click", copyForExcel);
        elements.resetButton.addEventListener("click", () => elements.resetDialog.showModal());
        elements.cancelResetButton.addEventListener("click", () => elements.resetDialog.close());
        elements.confirmResetButton.addEventListener("click", reset);
        document.querySelectorAll("[data-clear]").forEach((button) => {
          button.addEventListener("click", () => recordClear(button.dataset.clear));
        });
        elements.mobileUndoButton.addEventListener("click", undo);
        elements.mobileHintDialog.addEventListener("click", () => {
          if (elements.mobileHintDialog.open) elements.mobileHintDialog.close();
        });
        document.addEventListener("keydown", handleShortcut);
        document.addEventListener("touchstart", handleTouchStart, { passive: true });
        document.addEventListener("touchend", handleTouchEnd, { passive: true });
      });
    </script>
  </body>
</html>
