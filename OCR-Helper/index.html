<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title></title>

    <link rel="icon" href="favicon.ico" sizes="any" />
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />

    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/layout.css" />
    <link rel="stylesheet" href="css/controls.css" />
    <link rel="stylesheet" href="css/canvas.css" />
    <link rel="stylesheet" href="css/panels.css" />
    <link rel="stylesheet" href="css/tiles.css" />
    <link rel="stylesheet" href="css/tilesets.css" />
    <link rel="stylesheet" href="css/roi.css" />
    <link rel="stylesheet" href="css/live-ocr.css" />
    <link rel="stylesheet" href="css/modal.css" />
  </head>

  <body>
    <div id="app">
      <div id="topLayout">
        <div id="main">
          <section class="panel">
            <div class="row">
              <label for="cameraSelect">GB Interceptor</label>
              <select id="cameraSelect"></select>
              <button id="refreshCamera">Refresh devices</button>
              <button id="startCamera">Start Camera</button>
              <button id="newProject" class="pushRight">New project</button>
            </div>
          </section>

          <section class="panel">
            <div class="savedGameRow">
              <label for="savedGameSelect">Available Games</label>

              <select id="savedGameSelect">
                <option value="">Local games...</option>
              </select>

              <button id="loadSavedGame">Load</button>
              <button id="deleteSavedGame">Delete</button>
            </div>
          </section>

          <video id="video" autoplay playsinline muted></video>

          <section class="panel">
            <div class="imageRow">
              <div class="canvasContainer">
                <canvas id="canvas" width="160" height="144"></canvas>
                <canvas id="roiCanvas" width="160" height="144"></canvas>
                <div id="gridOverlay"></div>
                <canvas id="gridCanvas" width="160" height="144"></canvas>
              </div>

              <div class="sideInfo">
                <label class="autoDetectToggle">
                  <input id="autoDetectScreens" type="checkbox" />
                  <span class="slider"></span>
                  <span>Auto detect</span>
                </label>

                <div id="identifierInfo"></div>
                <div id="roiReadout"></div>
              </div>
            </div>

            <div class="buttonRow">
              <button id="calibrateButton">Calibrate</button>

              <div id="palette">
                <div class="shade">
                  <div class="shadeBox" id="shade0"></div>
                </div>
                <div class="shade">
                  <div class="shadeBox" id="shade1"></div>
                </div>
                <div class="shade">
                  <div class="shadeBox" id="shade2"></div>
                </div>
                <div class="shade">
                  <div class="shadeBox" id="shade3"></div>
                </div>
              </div>

              <span id="calibrationStatus" class="calibrationStatus bad"
                >✖</span
              >
            </div>
          </section>

          <section class="panel">
            <h2>Tiles</h2>
            <h3>Tile discoverer</h3>
            <div class="buttonRow">
              <button id="toggleCapture">▶</button>

              <span>
                Unique Tiles:
                <strong id="tileCount">0</strong>
              </span>

              <button id="addTileset">+ Tileset</button>
              <button id="sendToTileset">» Tileset</button>

              <div id="tileDeleteZone">Drop tile here to delete</div>

              <div class="captureROIPickerRow">
                <div id="captureROIPicker" class="captureROIPicker"></div>
              </div>
            </div>

            <hr />

            <div id="tilesContainer"></div>

            <hr />

            <h3>Tilesets</h3>
            <div id="tilesetContainer"></div>
          </section>

          <section class="panel">
            <h2>JSON</h2>

            <div class="buttonRow">
              <button id="downloadJSON">Download JSON</button>
              <button id="importJSON">Import JSON</button>

              <input
                id="importJSONFile"
                type="file"
                accept="application/json"
                style="display: none"
              />
            </div>

            <textarea id="jsonOutput" rows="18" spellcheck="false"></textarea>
          </section>
        </div>

        <div id="roiPanel">
          <div class="workflowHeader">
            <div id="workflowHint" class="workflowHint"></div>
            <hr />
          </div>

          <h2>Game</h2>
          <input id="gameName" type="text" placeholder="Game name..." />
          <button id="saveGameLocal">Save locally</button>
          <hr />

          <h2>Screens</h2>
          <button id="addScreen">+ Add Screen</button>
          <div id="screenList"></div>
          <hr />

          <h2 id="screenSetupTitle">Screen Setup</h2>

          <button id="identifierMode">Add Identifier Tile</button>
          <hr />

          <h3>ROIs</h3>
          <button id="addROI">+ Add ROI</button>
          <div id="roiList"></div>
        </div>
      </div>
    </div>

    <div id="modalOverlay" class="modalOverlay hidden">
      <div class="modalBox">
        <div id="modalMessage" class="modalMessage"></div>

        <input
          id="modalInput"
          class="modalInput"
          type="text"
          style="display: none"
        />

        <select
          id="modalSelect"
          class="modalInput"
          style="display: none"
        ></select>

        <div class="modalButtons">
          <button id="modalCancel">Cancel</button>
          <button id="modalOk">OK</button>
        </div>
      </div>
    </div>

    <script defer src="js/constants.js"></script>
    <script defer src="js/elements.js"></script>
    <script defer src="js/modal.js"></script>
    <script defer src="js/model.js"></script>
    <script defer src="js/utils.js"></script>
    <script defer src="js/live-ocr.js"></script>
    <script defer src="js/screens.js"></script>
    <script defer src="js/workflow.js"></script>
    <script defer src="js/import-export.js"></script>
    <script defer src="js/storage.js"></script>
    <script defer src="js/camera.js"></script>
    <script defer src="js/calibration.js"></script>
    <script defer src="js/tiles.js"></script>
    <script defer src="js/tilesets.js"></script>
    <script defer src="js/roi.js"></script>
    <script defer src="js/canvas-editor.js"></script>
    <script defer src="js/capture.js"></script>
    <script defer src="js/app.js"></script>
  </body>
</html>
