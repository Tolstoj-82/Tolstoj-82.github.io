<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GB OCR Helper</title>

    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="app">
      <div id="main">
        <!-- Camera Controls -->
        <section class="panel">
          <div class="row">
            <label for="cameraSelect"> GB Interceptor </label>

            <select id="cameraSelect"></select>

            <button id="refreshCamera">Refresh</button>

            <button id="startCamera">Start Camera</button>
          </div>
        </section>

        <!-- hidden video -->
        <video id="video" autoplay playsinline muted></video>

        <!-- Image -->
        <section class="panel">
          <div class="imageRow">
            <div class="canvasContainer">
              <canvas id="canvas" width="160" height="144"></canvas>
              <canvas id="roiCanvas" width="160" height="144"></canvas>
              <canvas id="gridCanvas" width="640" height="576"></canvas>
            </div>

            <div class="sideInfo">
              <div id="identifierInfo"></div>
              <div id="roiReadout"></div>
            </div>
          </div>

          <div class="buttonRow">
            <button id="calibrateButton">Calibrate</button>

            <div id="palette">
              <div class="shade">
                <div class="shadeBox" id="shade0"></div>
              </div>

              <div class="shade">
                <div class="shadeBox" id="shade1"></div>
              </div>

              <div class="shade">
                <div class="shadeBox" id="shade2"></div>
              </div>

              <div class="shade">
                <div class="shadeBox" id="shade3"></div>
              </div>
            </div>

            <span id="calibrationStatus" class="calibrationStatus bad">✖</span>
          </div>
        </section>
      </div>
      <div id="roiPanel">
        <div class="workflowHeader">
          <div id="workflowHint" class="workflowHint"></div>
        </div>
        <hr />

        <h2>Game</h2>

        <input id="gameName" type="text" placeholder="Game name..." />

        <hr />

        <h2>Screens</h2>

        <button id="addScreen">+ Add Screen</button>

        <div id="screenList"></div>

        <hr />

        <h2>Screen Setup</h2>
        <div id="selectedScreenName" class="selectedScreenName">
          No screen selected
        </div>

        <button id="identifierMode">Add Identifier Tile</button>

        <hr />

        <h2>ROIs</h2>

        <button id="addROI">+ Add ROI</button>

        <div id="roiList"></div>
      </div>

      <section class="panel">
        <h2>Search for Tiles</h2>

        <div class="buttonRow">
          <button id="toggleCapture">▶</button>

          <span>
            Unique Tiles:
            <strong id="tileCount">0</strong>
          </span>

          <button id="addTileset">+ Tileset</button>
          <button id="sendToTileset">» Tileset</button>

          <div id="tileDeleteZone">Drop tile here to delete</div>
          <div class="captureROIPickerRow">
            <div id="captureROIPicker" class="captureROIPicker"></div>
          </div>
        </div>

        <hr />

        <div id="tilesContainer"></div>
        <hr />

        <h2>Tilesets</h2>
        <div id="tilesetContainer"></div>
      </section>

      <!-- Export -->
      <section class="panel">
        <h2>Export</h2>

        <div class="buttonRow">
          <button id="exportJSON">Export JSON</button>
          <button id="downloadJSON">Download JSON</button>
          <!-- Import -->
          <button id="importJSON">Import JSON</button>

          <input
            id="importJSONFile"
            type="file"
            accept="application/json"
            style="display: none"
          />
        </div>

        <textarea id="jsonOutput" rows="18" spellcheck="false"></textarea>
      </section>
    </div>

    <script src="code.js"></script>
  </body>
</html>
